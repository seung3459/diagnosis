<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>기계설비 노후화 진단 어플리케이션</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  body{font-family:'Pretendard','Malgun Gothic',sans-serif;margin:0;background:#eef2f7;}
  .topbar{background:#1f2937;padding:12px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;justify-content:center;flex-wrap:wrap;gap:6px;}
  .topbar button{background:#2563eb;color:#fff;border:none;padding:10px 16px;border-radius:10px;font-weight:bold;cursor:pointer;font-size:13px;}
  .topbar button.export-btn{background:#059669;}
  .topbar button.export-btn:hover{background:#047857;}
  .topbar button.pdf-btn{background:#dc2626;}
  .topbar button.pdf-btn:hover{background:#b91c1c;}
  .container{padding:15px;max-width:1200px;margin:0 auto;}
  .page{display:none;}
  .page.active{display:block;}

  .main-hero{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#3b82f6 100%);color:#fff;padding:36px 30px;border-radius:20px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 20px 40px rgba(37,99,235,.25);}
  .main-hero::before{content:'';position:absolute;top:-60%;right:-10%;width:500px;height:500px;background:radial-gradient(circle, rgba(255,255,255,.15) 0%, transparent 65%);pointer-events:none;}
  .main-hero::after{content:'';position:absolute;bottom:-50%;left:-10%;width:400px;height:400px;background:radial-gradient(circle, rgba(255,255,255,.08) 0%, transparent 65%);pointer-events:none;}
  .logo-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;position:relative;z-index:1;flex-wrap:wrap;}
  .himec-logo{background:#fff;border-radius:12px;padding:10px 18px;font-weight:900;font-size:22px;letter-spacing:2px;box-shadow:0 6px 20px rgba(0,0,0,.2);display:inline-flex;align-items:center;gap:2px;}
  .himec-logo .h{color:#dc2626;}
  .himec-logo .rest{background:linear-gradient(135deg,#1e3a8a,#2563eb);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .logo-divider{width:1px;height:36px;background:rgba(255,255,255,.3);}
  .app-title{font-size:26px;font-weight:800;margin:0;letter-spacing:-.5px;line-height:1.3;}
  .app-subtitle{font-size:13px;opacity:.85;margin-top:4px;}
  .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;margin-top:12px;backdrop-filter:blur(10px);position:relative;z-index:1;}

  .project-info-card{background:#fff;border-radius:16px;padding:24px;margin-bottom:18px;box-shadow:0 10px 30px rgba(0,0,0,.06);border:1px solid #e5e7eb;}
  .info-card-title{font-size:16px;font-weight:700;color:#1f2937;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .info-field-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media (max-width:600px){ .info-field-grid{grid-template-columns:1fr;} }
  .info-field{display:flex;flex-direction:column;gap:6px;}
  .info-field label{font-size:12px;font-weight:700;color:#6b7280;}
  .info-field input{padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;box-sizing:border-box;transition:all .15s;background:#f9fafb;}
  .info-field input:focus{outline:none;border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.12);}

  .calendar-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:0 10px 30px rgba(0,0,0,.06);border:1px solid #e5e7eb;}
  .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .cal-title{font-size:18px;font-weight:800;color:#1f2937;}
  .cal-nav{display:flex;gap:6px;}
  .cal-nav button{width:36px;height:36px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;font-size:14px;font-weight:700;color:#4b5563;transition:all .15s;}
  .cal-nav button:hover{background:#f3f4f6;border-color:#9ca3af;}
  .cal-today-btn{padding:0 14px !important;width:auto !important;color:#2563eb !important;border-color:#2563eb !important;}
  .cal-today-btn:hover{background:#eff6ff !important;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-day-head{text-align:center;font-size:12px;font-weight:700;color:#6b7280;padding:8px 0;}
  .cal-day-head.sun{color:#dc2626;}
  .cal-day-head.sat{color:#2563eb;}
  .cal-day{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#374151;border-radius:8px;cursor:default;transition:all .15s;position:relative;}
  .cal-day.prev,.cal-day.next{color:#d1d5db;}
  .cal-day.sun{color:#dc2626;}
  .cal-day.sat{color:#2563eb;}
  .cal-day.prev.sun,.cal-day.prev.sat,.cal-day.next.sun,.cal-day.next.sat{color:#d1d5db;}
  .cal-day.today{background:#2563eb;color:#fff !important;font-weight:800;box-shadow:0 4px 12px rgba(37,99,235,.35);}
  .cal-day.start-date{background:#fef3c7;color:#92400e !important;font-weight:800;border:2px solid #f59e0b;}
  .cal-day.start-date.today{background:linear-gradient(135deg,#2563eb,#f59e0b);color:#fff !important;}
  .cal-day.start-date::after{content:'⭐';position:absolute;top:-4px;right:-4px;font-size:10px;}
  .cal-legend{display:flex;gap:16px;margin-top:14px;padding-top:14px;border-top:1px solid #e5e7eb;flex-wrap:wrap;}
  .cal-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;}
  .cal-dot{width:12px;height:12px;border-radius:4px;}
  .cal-dot.today{background:#2563eb;}
  .cal-dot.start{background:#fef3c7;border:1.5px solid #f59e0b;}

  .main-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0 20px;}
  @media (max-width:700px){ .main-tabs{grid-template-columns:repeat(2,1fr);} }
  .main-tabs button{background:#fff;color:#6b7280;border:2px solid #e5e7eb;padding:16px 12px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .main-tabs button .tab-icon{font-size:22px;}
  .main-tabs button:hover{border-color:#93c5fd;background:#f0f9ff;color:#2563eb;}
  .main-tabs button.active{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;border-color:#2563eb;box-shadow:0 6px 18px rgba(37,99,235,.35);transform:translateY(-1px);}

  .sub-tabs{display:flex;gap:8px;margin:12px 0 18px;flex-wrap:wrap;padding:8px;background:#f3f4f6;border-radius:12px;}
  .sub-tabs button{background:#fff;color:#4b5563;border:1px solid #e5e7eb;padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
  .sub-tabs button:hover{background:#eff6ff;border-color:#60a5fa;color:#2563eb;}
  .sub-tabs button.active{background:#2563eb;color:#fff;border-color:#2563eb;box-shadow:0 2px 8px rgba(37,99,235,.3);}

  .diag-page{background:#fff;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,.06);}

  .card-controls{display:flex;justify-content:space-between;align-items:center;margin:8px 0 14px;gap:10px;flex-wrap:wrap;}
  .card-controls .count-badge{font-size:13px;color:#4b5563;font-weight:600;background:#f3f4f6;padding:6px 12px;border-radius:999px;}
  .card-controls .toggle-all{background:#fff;color:#2563eb;border:1.5px solid #2563eb;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
  .card-controls .toggle-all:hover{background:#2563eb;color:#fff;}

  .summary-wrap{margin-bottom:20px;}
  .summary-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e5e7eb;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.04);}
  .summary-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:1000px;}
  .summary-table th,.summary-table td{border-bottom:1px solid #e5e7eb;border-right:1px solid #e5e7eb;padding:10px 8px;text-align:center;vertical-align:middle;}
  .summary-table th:last-child,.summary-table td:last-child{border-right:none;}
  .summary-table tbody tr:last-child td{border-bottom:none;}
  .summary-table thead th{background:#f3f4f6;color:#111827;font-weight:700;font-size:12px;padding:12px 8px;letter-spacing:.3px;}
  .summary-table thead th:first-child{border-top-left-radius:12px;}
  .summary-table thead th:last-child{border-top-right-radius:12px;}
  .summary-table tbody tr:hover{background:#fafbfc;}
  .summary-table .type-col{background:#f9fafb;font-weight:700;color:#374151;font-size:12px;text-align:left;padding-left:14px;white-space:nowrap;}
  .summary-table .unit-col{font-weight:700;text-align:center;cursor:pointer;color:#2563eb;transition:all .15s;}
  .summary-table .unit-col:hover{background:#dbeafe;text-decoration:underline;}
  .summary-table tr.group-start td{border-top:2px solid #cbd5e1;}

  .rating-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-weight:700;font-size:12px;border:1.5px solid transparent;}
  .rating-badge.A{background:#d1fae5;color:#059669;border-color:#6ee7b7;}
  .rating-badge.B{background:#fed7aa;color:#d97706;border-color:#fdba74;}
  .rating-badge.C{background:#fecaca;color:#dc2626;border-color:#fca5a5;}
  .rating-badge.empty{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb;}

  .grade-cell{font-weight:800;font-size:15px;line-height:1.2;}
  .grade-cell .grade-score{display:block;font-size:10px;font-weight:600;color:#6b7280;margin-top:2px;}
  .grade-A{color:#059669;}
  .grade-B{color:#d97706;}
  .grade-C{color:#dc2626;}
  .grade-empty{color:#9ca3af;}

  .no-data{padding:30px 20px;text-align:center;color:#9ca3af;font-size:14px;background:#f9fafb;border-radius:12px;border:1px dashed #d1d5db;}

  .card{background:#fff;border-radius:16px;overflow:hidden;margin:12px 0;box-shadow:0 8px 20px rgba(0,0,0,.06);border:1px solid #e5e7eb;position:relative;transition:box-shadow .2s;}
  .card:hover{box-shadow:0 12px 30px rgba(0,0,0,.1);}
  .card.highlight{box-shadow:0 0 0 3px #2563eb,0 12px 30px rgba(37,99,235,.25);}

  .card-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;background:linear-gradient(135deg,#1f2937,#374151);color:#fff;transition:background .15s;}
  .card-header:hover{background:linear-gradient(135deg,#111827,#1f2937);}
  .card-header .header-icon{flex-shrink:0;width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;}
  .card-header .header-title{flex:1;font-size:16px;font-weight:700;display:flex;flex-direction:column;gap:3px;}
  .card-header .header-sub{font-size:12px;font-weight:500;color:#d1d5db;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .status-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;}
  .chip-use{background:#10b981;color:#fff;}
  .chip-fail{background:#ef4444;color:#fff;}
  .chip-unused{background:#9ca3af;color:#fff;}
  .chip-inv{background:#8b5cf6;color:#fff;}
  .chip-A{background:#d1fae5;color:#059669;}
  .chip-B{background:#fed7aa;color:#d97706;}
  .chip-C{background:#fecaca;color:#dc2626;}
  .chip-grade{background:#1f2937;color:#fff;font-weight:800;}

  .card-header .arrow{flex-shrink:0;font-size:14px;transition:transform .25s;}
  .card.expanded .card-header .arrow{transform:rotate(180deg);}
  .card-header .delete-btn{position:static;background:rgba(239,68,68,.9);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;}
  .card-header .delete-btn:hover{background:#dc2626;}

  .card-content{max-height:0;overflow:hidden;transition:max-height .3s ease-out;}
  .card.expanded .card-content{max-height:20000px;transition:max-height .5s ease-in;}

  .equip-image{position:relative;height:180px;}
  .equip-image img{width:100%;height:100%;object-fit:cover;}
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff;}
  .overlay .title{font-size:18px;font-weight:bold;margin-bottom:8px;}

  .status-segment{display:inline-flex;gap:0;background:rgba(255,255,255,.12);border-radius:10px;padding:3px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);margin-bottom:4px;}
  .status-segment label{padding:6px 14px;cursor:pointer;border-radius:8px;transition:all .2s;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:4px;color:#fff;}
  .status-segment label:hover{background:rgba(255,255,255,.08);}
  .status-segment input{display:none;}
  .status-segment label.active{box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .status-segment label.active[data-val="use"]{background:#10b981;color:#fff;}
  .status-segment label.active[data-val="fail"]{background:#ef4444;color:#fff;}
  .status-segment label.active[data-val="unused"]{background:#6b7280;color:#fff;}

  .extra-check-row{display:flex;gap:14px;margin-top:8px;font-weight:700;font-size:13px;flex-wrap:wrap;}
  .extra-check-row label{display:flex;align-items:center;gap:5px;white-space:nowrap;cursor:pointer;}

  .card-body{background:#fff;padding:18px;}
  input[type="text"],input[type="number"]{width:100%;padding:10px;border-radius:10px;border:1px solid #d1d5db;font-size:14px;margin-top:4px;box-sizing:border-box;}
  .btn{background:#2563eb;color:#fff;border:none;padding:10px 16px;margin:5px 0;border-radius:10px;font-weight:bold;cursor:pointer;}
  pre{background:#0f172a;color:#e5e7eb;padding:12px;border-radius:10px;font-size:12px;overflow:auto;}

  .section-title{font-size:14px;font-weight:700;color:#374151;margin:18px 0 10px;padding-bottom:6px;border-bottom:2px solid #e5e7eb;display:flex;align-items:center;gap:6px;}
  .section-title:first-child{margin-top:0;}

  .grid{display:grid;gap:12px;}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  @media (max-width:900px){ .grid-3{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:560px){ .grid-3,.grid-2{grid-template-columns:1fr;} }

  .field{display:flex;flex-direction:column;gap:4px;}
  .field > label{font-size:12px;font-weight:600;color:#6b7280;margin:0;}
  .field .input-wrap{position:relative;}
  .field input,.field select{width:100%;padding:10px 44px 10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;box-sizing:border-box;margin:0;transition:border-color .15s,box-shadow .15s;background:#fff;}
  .field select{padding:10px 12px;cursor:pointer;font-weight:700;color:#1e40af;}
  .field input:focus,.field select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
  .field .unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;color:#9ca3af;font-weight:600;pointer-events:none;}

  .type-select-card{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:2px solid #3b82f6;border-radius:12px;padding:16px;margin-bottom:12px;}
  .type-select-card .field > label{font-size:13px;color:#1e40af;font-weight:700;}

  .cs-sub-card{background:#f9fafb;border-radius:12px;padding:16px;border:1px solid #e5e7eb;margin-bottom:0;}
  .inverter-field{display:none;margin-top:12px;}
  .inverter-field.active{display:block;}

  .diag-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e5e7eb;}
  .diag-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;background:#fff;min-width:820px;}
  .diag-table th,.diag-table td{border-bottom:1px solid #e5e7eb;border-right:1px solid #e5e7eb;padding:12px 10px;text-align:center;vertical-align:middle;}
  .diag-table th:last-child,.diag-table td:last-child{border-right:none;}
  .diag-table tbody tr:last-child td{border-bottom:none;}
  .diag-table thead th{background:#1f2937;color:#fff;font-weight:700;font-size:13px;padding:12px 10px;letter-spacing:.5px;}
  .diag-table thead th:first-child{border-top-left-radius:12px;}
  .diag-table thead th:last-child{border-top-right-radius:12px;}
  .diag-table tbody tr:hover{background:#fafbfc;}
  .diag-table .factor{width:170px;background:#f9fafb;text-align:left;padding:12px 14px;}
  .factor-inner{display:flex;align-items:center;gap:10px;}
  .factor-num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
  .factor-name{font-weight:700;color:#111827;font-size:13px;line-height:1.3;text-align:left;}
  .factor-weight{font-size:10px;color:#2563eb;font-weight:700;background:#eff6ff;padding:1px 6px;border-radius:999px;margin-top:2px;display:inline-block;}
  .diag-table .rating-cell{width:85px;padding:10px 8px;}
  .rating-group{display:flex;flex-direction:column;gap:6px;align-items:stretch;}
  .rating-group label{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 10px;border:1.5px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;margin:0;background:#fff;transition:all .15s;}
  .rating-group input[type="radio"]{margin:0;cursor:pointer;accent-color:#2563eb;}
  .rating-group label:hover{background:#f3f4f6;border-color:#9ca3af;}
  .rating-group label.sel-A{background:#d1fae5;border-color:#059669;}
  .rating-group label.sel-B{background:#fed7aa;border-color:#d97706;}
  .rating-group label.sel-C{background:#fecaca;border-color:#dc2626;}
  .rating-A{color:#059669;}
  .rating-B{color:#d97706;}
  .rating-C{color:#dc2626;}
  .diag-table td input[type="text"]{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:12px;margin:0;box-sizing:border-box;}
  .diag-table td input[type="text"]:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.15);}
  .diag-table .content-cell{min-width:220px;text-align:left;}
  .diag-table .target{width:110px;color:#4b5563;font-size:12px;font-weight:500;}
  .diag-table .note-cell{width:160px;}
  .diag-table .info-cell{width:70px;}
  .info-btn{background:#3b82f6;color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:14px;font-weight:bold;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:transform .15s,background .15s;box-shadow:0 2px 6px rgba(59,130,246,.3);}
  .info-btn:hover{background:#1d4ed8;transform:scale(1.1);}

  .photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;background:#f9fafb;border-radius:12px;padding:14px;border:1px solid #e5e7eb;}
  @media (max-width:600px){ .photo-grid{grid-template-columns:1fr;} }
  .photo-slot{background:#fff;border-radius:12px;overflow:hidden;border:1.5px solid #e5e7eb;transition:all .15s;display:flex;flex-direction:column;}
  .photo-slot:hover{border-color:#93c5fd;box-shadow:0 4px 12px rgba(37,99,235,.1);}
  .photo-slot.has-image{border-color:#2563eb;}
  .photo-desc-input{padding:10px;border-bottom:1px solid #f3f4f6;}
  .photo-desc-input input{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;box-sizing:border-box;margin:0;font-weight:500;}
  .photo-desc-input input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.12);}
  .photo-display{position:relative;width:100%;aspect-ratio:4/3;background:#f3f4f6;cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .photo-display img{width:100%;height:100%;object-fit:cover;}
  .photo-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#9ca3af;text-align:center;padding:20px;}
  .photo-empty .cam-icon{font-size:38px;opacity:.6;}
  .photo-empty .cam-text{font-size:12px;font-weight:700;}
  .photo-empty .cam-sub{font-size:11px;color:#d1d5db;}
  .photo-slot-num{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;backdrop-filter:blur(6px);}
  .photo-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;}
  .photo-btn{background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:8px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer;backdrop-filter:blur(6px);transition:all .15s;}
  .photo-btn:hover{background:rgba(0,0,0,.9);transform:scale(1.05);}
  .photo-btn.del{background:rgba(220,38,38,.85);}
  .photo-btn.del:hover{background:rgba(185,28,28,1);}

  usage_years: 0.30,

  install_env: 0.10,

// 종합 등급 계산: { grade: 'A'|'B'|'C'|'-', score: 숫자 }
function calculateOverallGrade(rates){
  let score = 0;
  let hasAny = false;
  for(const key in diagWeights){
    const rate = rates[key];
    if(rate && diagRateScores[rate] !== undefined){
      score += diagWeights[key] * diagRateScores[rate] * 100;
      hasAny = true;
    }
  }
  if(!hasAny) return { grade:'-', score:0 };
  const finalScore = Math.round(score * 10) / 10;
  let grade;
  if(finalScore <= 40) grade = 'C';
  else if(finalScore <= 60) grade = 'B';
  else grade = 'A';
  return { grade, score: finalScore };

function renderCalendar(){
  const title = document.getElementById('calTitle');
  const grid = document.getElementById('calGrid');
  if(!title || !grid) return;
  title.textContent = `${calYear}년 ${calMonth+1}월`;
  const today = new Date();
  const startDateStr = document.getElementById('projectStartDate')?.value;
  const startDate = startDateStr ? new Date(startDateStr) : null;
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  const dayNames = ['일','월','화','수','목','금','토'];
  let html = '';
  dayNames.forEach((d,i)=>{ const cls = i===0?'sun':(i===6?'sat':''); html += `<div class="cal-day-head ${cls}">${d}</div>`; });
  for(let i=firstDay-1; i>=0; i--){ const dayNum = prevMonthDays - i; const dow = (firstDay-1-i); const cls = dow===0?'sun':(dow===6?'sat':''); html += `<div class="cal-day prev ${cls}">${dayNum}</div>`; }
  for(let d=1; d<=daysInMonth; d++){
    const dow = new Date(calYear, calMonth, d).getDay();
    const classes = ['cal-day'];
    if(dow===0) classes.push('sun'); else if(dow===6) classes.push('sat');
    if(today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d) classes.push('today');
    if(startDate && startDate.getFullYear()===calYear && startDate.getMonth()===calMonth && startDate.getDate()===d) classes.push('start-date');
    html += `<div class="${classes.join(' ')}">${d}</div>`;
  }
  const used = firstDay + daysInMonth;
  for(let d=1; d<=totalCells-used; d++){ const dow = (used+d-1)%7; const cls = dow===0?'sun':(dow===6?'sat':''); html += `<div class="cal-day next ${cls}">${d}</div>`; }
  grid.innerHTML = html;
}
function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
function calToday(){ const t=new Date(); calYear=t.getFullYear(); calMonth=t.getMonth(); renderCalendar(); }

function hasSubtype(type){ return !!subtypeMap[type]; }
function getSubtypeInfo(type, key){ const list = subtypeMap[type]; if(!list) return null; return list.find(s=>s.key===key) || list[0]; }
function getUnitSubtype(type, id){ if(!hasSubtype(type)) return null; return unitSubtype[`${type}_${id}`] || subtypeMap[type][0].key; }
function labelKor(type){ const map = {coldSource:'냉열원', heatSource:'온열원', coolingTower:'냉각탑', ahu:'공조기', fan:'급·배기팬', chilled_pump:'냉수펌프', hot_pump:'온수펌프', cooling_pump:'냉각수펌프', pipe:'배관설비'}; return map[type]; }

function getSubtypeNumber(type, id){
  if(!hasSubtype(type)){
    const container = document.getElementById(type+'Units');
    if(!container) return 0;
    const cards = Array.from(container.querySelectorAll('.card'));
    return cards.findIndex(c => c.dataset.id == id) + 1;
  }
  const mySubtype = getUnitSubtype(type, id);
  const container = document.getElementById(type+'Units');
  if(!container) return 0;
  let count = 0;
  for(const card of container.querySelectorAll('.card')){
    if(getUnitSubtype(type, card.dataset.id) === mySubtype){
      count++;
      if(card.dataset.id == id) return count;
    }
  }
  return 0;
}

function getDisplayName(type, id){
  if(hasSubtype(type)){
    const info = getSubtypeInfo(type, getUnitSubtype(type, id));
    return `${info.label} - ${getSubtypeNumber(type, id)}호기`;
  }
  return `${labelKor(type)} - ${getSubtypeNumber(type, id)}호기`;
}
function getDisplayIcon(type, id){
  if(hasSubtype(type)) return getSubtypeInfo(type, getUnitSubtype(type, id)).icon;

function renderPhotoSlot(type, id, idx){

      </div>
      <div class="photo-display" onclick="triggerPhotoInput('${type}',${id},${idx})">
        <div class="photo-slot-num">${idx+1}</div>

  `;

function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function triggerPhotoInput(type, id, idx){
  const input = document.getElementById(`${type}_${id}_input_${idx}`);
  if(input) input.click();
}

function handlePhotoInput(input, type, id, idx){
  const file = input.files && input.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('❌ 이미지 파일만 선택 가능합니다'); return; }
  resizeImage(file, PHOTO_MAX_SIZE, PHOTO_QUALITY).then(dataURL=>{
    if(!unitPhotos[`${type}_${id}`]){
      unitPhotos[`${type}_${id}`] = new Array(PHOTO_COUNT).fill(null).map(()=>({img:null, desc:''}));
    }
    unitPhotos[`${type}_${id}`][idx].img = dataURL;
    const slot = document.getElementById(`${type}_${id}_slot_${idx}`);
    if(slot){
      const wrap = document.createElement('div');
      wrap.innerHTML = renderPhotoSlot(type, id, idx);
      slot.parentElement.replaceChild(wrap.firstElementChild, slot);
    }
    input.value = '';
    showToast(`✅ 사진 ${idx+1} 업로드 완료`);
    updateSummary(type, id);
  }).catch(err=>{ console.error(err); showToast('❌ 이미지 처리 실패'); });
}

function removePhoto(type, id, idx){
  if(!unitPhotos[`${type}_${id}`]) return;
  unitPhotos[`${type}_${id}`][idx].img = null;
  const slot = document.getElementById(`${type}_${id}_slot_${idx}`);
  if(slot){
    const wrap = document.createElement('div');
    wrap.innerHTML = renderPhotoSlot(type, id, idx);
    slot.parentElement.replaceChild(wrap.firstElementChild, slot);
  }
  updateSummary(type, id);
}

function updatePhotoMeta(type, id, idx, field, value){

  unitPhotos[`${type}_${id}`][idx][field] = value;
}

function resizeImage(file, maxSize, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width, height} = img;
        if(width > maxSize || height > maxSize){
          if(width > height){ height = Math.round(height * (maxSize/width)); width = maxSize; }
          else { width = Math.round(width * (maxSize/height)); height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  }
  updateSummary(type, id);
  renderGroupSummary(type);
}

  if(status==='use') return '<span class="status-chip chip-use">🟢 사용</span>';

  if(status==='unused') return '<span class="status-chip chip-unused">⚪ 미사용</span>';
  return '<span style="color:#9ca3af;font-size:11px;">미지정</span>';
}

function statusText(status){
  if(status==='use') return '🟢 사용';
  if(status==='fail') return '🔴 고장';
  if(status==='unused') return '⚪ 미사용';
  return '미지정';
}

// 카드의 평가 결과를 객체로 가져오기
function getUnitRates(type, id){
  const rates = {};
  turboDiagItems.forEach(item=>{
    const rateEl = document.querySelector(`input[name="${type}_${id}_diag_${item.key}_rate"]:checked`);
    if(rateEl) rates[item.key] = rateEl.value;
  });
  return rates;
}

function renderGroupSummary(type){
  const wrap = document.getElementById(`${type}SummaryWrap`);
  if(!wrap) return;
  const cards = Array.from(document.querySelectorAll(`#${type}Units .card`));
  if(cards.length===0){ wrap.innerHTML = `<div class="no-data">📋 ${labelKor(type)}을(를) 추가하면 이곳에 진단 요약표가 자동으로 표시됩니다.</div>`; return; }
  const showDiag = diagApplyTypes.includes(type);
  const withSub = hasSubtype(type);
  const ordered = [];
  if(withSub){ subtypeMap[type].forEach(st=>{ cards.forEach(card=>{ if(getUnitSubtype(type, card.dataset.id) === st.key) ordered.push({card, st}); }); }); }
  else { cards.forEach(card=>ordered.push({card, st:null})); }
  let headers = '';
  if(withSub) headers += '<th style="width:160px;">종류</th>';
  headers += '<th style="width:70px;">호기</th><th style="width:90px;">상태</th>';
  if(showDiag){ turboDiagItems.forEach(item=>{ headers += `<th>${item.short}<br><span style="font-size:10px;font-weight:500;color:#6b7280;">(${item.weight}%)</span></th>`; }); headers += '<th style="width:90px;">종합</th>'; }
  let rows = '';
  let counter = {};
  let prevSubtype = null;
  ordered.forEach(({card, st})=>{
    const id = card.dataset.id;
    const st_chip = statusChip(getUnitStatus(type, id));
    let typeCell = ''; let unitNum = 0; let rowClass = '';
    if(withSub){
      const key = st.key;
      counter[key] = (counter[key]||0) + 1;
      unitNum = counter[key];
      typeCell = `<td class="type-col">${st.icon} ${st.label}</td>`;
      if(prevSubtype !== null && prevSubtype !== key) rowClass = 'group-start';
      prevSubtype = key;
    } else { unitNum = ordered.findIndex(x=>x.card === card) + 1; }
    let diagCells = '', gradeCell = '';
    if(showDiag){
      const rates = getUnitRates(type, id);
      turboDiagItems.forEach(item=>{
        const v = rates[item.key];
        if(v) diagCells += `<td class="rating-cell"><span class="rating-badge ${v}">${v}</span></td>`;
        else diagCells += `<td class="rating-cell"><span class="rating-badge empty">-</span></td>`;
      });
      const { grade, score } = calculateOverallGrade(rates);
      let gradeCls = 'grade-empty';
      if(grade==='A') gradeCls='grade-A';
      else if(grade==='B') gradeCls='grade-B';
      else if(grade==='C') gradeCls='grade-C';
      const gradeText = grade === '-' ? '-' : `${grade}<span class="grade-score">${score}점</span>`;
      gradeCell = `<td class="grade-cell ${gradeCls}">${gradeText}</td>`;
    }
    rows += `<tr class="${rowClass}">${typeCell}<td class="unit-col" onclick="scrollToCard('${type}_${id}_card')" title="클릭하면 해당 호기로 이동">${unitNum}호기</td><td>${st_chip}</td>${diagCells}${gradeCell}</tr>`;
  });
  wrap.innerHTML = `<div class="section-title" style="margin-top:0;">📊 ${labelKor(type)} 진단 요약</div><div class="summary-table-wrap"><table class="summary-table"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div><div style="font-size:11px;color:#9ca3af;margin-top:6px;padding:0 4px;">💡 호기 번호를 클릭하면 해당 카드로 이동합니다.${showDiag?' / 종합 점수: A=1, B=0.6, C=0.2 × 가중치 합산 (60점 초과 A / 40점 초과 60점 이하 B / 40점 이하 C)':''}</div>`;
}

function scrollToCard(cardId){ const card = document.getElementById(cardId); if(!card) return; card.classList.add('expanded'); card.scrollIntoView({behavior:'smooth', block:'start'}); card.classList.add('highlight'); setTimeout(()=>{ card.classList.remove('highlight'); }, 1800); }

function toggleCard(cardId, e){

function toggleAll(type, expand){

}

function updateSummary(type, id){
  const el = document.getElementById(`${type}_${id}_summary`);
  if(!el) return;
  const chips = [];
  const status = getUnitStatus(type, id);
  if(status === 'use') chips.push(`<span class="status-chip chip-use">🟢 사용중</span>`);
  else if(status === 'fail') chips.push(`<span class="status-chip chip-fail">🔴 고장</span>`);
  else if(status === 'unused') chips.push(`<span class="status-chip chip-unused">⚪ 미사용</span>`);
  const invEl = document.getElementById(`${type}_${id}_inverter`);
  if(invEl && invEl.checked) chips.push(`<span class="status-chip chip-inv">인버터</span>`);
  if(diagApplyTypes.includes(type)){
    const rates = getUnitRates(type, id);
    let a=0,b=0,c=0;
    Object.values(rates).forEach(v=>{ if(v==='A')a++; else if(v==='B')b++; else if(v==='C')c++; });
    if(a) chips.push(`<span class="status-chip chip-A">A ${a}</span>`);
    if(b) chips.push(`<span class="status-chip chip-B">B ${b}</span>`);
    if(c) chips.push(`<span class="status-chip chip-C">C ${c}</span>`);
    const { grade, score } = calculateOverallGrade(rates);
    if(grade !== '-'){
      chips.push(`<span class="status-chip chip-${grade}">종합 ${grade} (${score}점)</span>`);
    }
  }
  const photos = unitPhotos[`${type}_${id}`];
  if(photos){
    const filled = photos.filter(p=>p && p.img).length;
    if(filled>0) chips.push(`<span class="status-chip" style="background:#06b6d4;color:#fff;">📸 ${filled}/${PHOTO_COUNT}</span>`);
  }
  el.innerHTML = chips.length ? chips.join('') : '<span style="color:#9ca3af;">상태 미입력</span>';
}

function updateCount(type){
  const el = document.getElementById(`${type}_count`);

  const cnt = container ? container.querySelectorAll('.card').length : 0;
  el.textContent = `${cnt} 대`;
}

function toggleInverter(type, id){

function collectUnitData(type, id){
  const data = {};
  if(hasSubtype(type)) data.subtype = getUnitSubtype(type, id);
  data.status = getUnitStatus(type, id);
  ['inverter','supplyFan','exhaustFan'].forEach(k=>{ const el = document.getElementById(`${type}_${id}_${k}`); if(el) data[k] = el.checked; });
  fieldConfig[type].forEach((_,idx)=>{ const el = document.getElementById(`${type}_${id}_f${idx+1}`); if(el) data[`f${idx+1}`] = el.value; });
  if(type === 'coldSource'){
    data.nameplate = {};
    ['maker','model','date','cooling','flow','power'].forEach(f=>{ const el = document.getElementById(`${type}_${id}_np_${f}`); if(el) data.nameplate[f] = el.value; });
    const invEl = document.getElementById(`${type}_${id}_inverterValue`);
    if(invEl) data.inverterValue = invEl.value;
  }
  if(diagApplyTypes.includes(type)){
    data.diag = {};
    turboDiagItems.forEach(item=>{
      const baseKey = `${type}_${id}_diag_${item.key}`;
      const rateEl = document.querySelector(`input[name="${baseKey}_rate"]:checked`);
      const contentEl = document.getElementById(`${baseKey}_content`);
      const noteEl = document.getElementById(`${baseKey}_note`);
      data.diag[item.key] = { rate: rateEl ? rateEl.value : null, content: contentEl ? contentEl.value : '', note: noteEl ? noteEl.value : '' };
    });
    const opEl = document.getElementById(`${type}_${id}_opinion`);
    if(opEl) data.opinion = opEl.value;
  }
  data.photos = unitPhotos[`${type}_${id}`] || [];
  return data;
}

function applyUnitData(type, id, data){
  if(hasSubtype(type) && data.subtype){
    unitSubtype[`${type}_${id}`] = data.subtype;
    const sel = document.getElementById(`${type}_${id}_subtype`);
    if(sel) sel.value = data.subtype;
    refreshCardLabels(type);
  }
  let status = data.status;
  if(!status && (data.use !== undefined || data.fail !== undefined)){
    if(data.fail) status = 'fail'; else if(data.use) status = 'use'; else status = '';
  }
  if(status) setUnitStatus(type, id, status);
  ['inverter','supplyFan','exhaustFan'].forEach(k=>{ const el = document.getElementById(`${type}_${id}_${k}`); if(el && data[k] !== undefined) el.checked = data[k]; });
  fieldConfig[type].forEach((_,idx)=>{ const el = document.getElementById(`${type}_${id}_f${idx+1}`); if(el && data[`f${idx+1}`] !== undefined) el.value = data[`f${idx+1}`]; });
  if(type === 'coldSource'){
    if(data.nameplate){ ['maker','model','date','cooling','flow','power'].forEach(f=>{ const el = document.getElementById(`${type}_${id}_np_${f}`); if(el && data.nameplate[f] !== undefined) el.value = data.nameplate[f]; }); }
    if(data.inverterValue !== undefined){ const invEl = document.getElementById(`${type}_${id}_inverterValue`); if(invEl) invEl.value = data.inverterValue; }
    toggleInverter(type, id);
  }
  if(diagApplyTypes.includes(type) && data.diag){
    turboDiagItems.forEach(item=>{
      const d = data.diag[item.key];
      if(!d) return;
      const baseKey = `${type}_${id}_diag_${item.key}`;
      if(d.rate){ const radios = document.getElementsByName(`${baseKey}_rate`); radios.forEach(r=>{ if(r.value === d.rate){ r.checked = true; updateRatingStyle(r); } }); }
      const contentEl = document.getElementById(`${baseKey}_content`);
      if(contentEl && d.content !== undefined) contentEl.value = d.content;
      const noteEl = document.getElementById(`${baseKey}_note`);
      if(noteEl && d.note !== undefined) noteEl.value = d.note;
    });
    if(data.opinion !== undefined){ const opEl = document.getElementById(`${type}_${id}_opinion`); if(opEl) opEl.value = data.opinion; }
  }
  if(Array.isArray(data.photos) && data.photos.length > 0){
    const photos = new Array(PHOTO_COUNT).fill(null).map((_,i)=>{
      const p = data.photos[i];
      return p ? {img:p.img||null, desc:p.desc||''} : {img:null,desc:''};
    });
    unitPhotos[`${type}_${id}`] = photos;
    const grid = document.getElementById(`${type}_${id}_photoGrid`);
    if(grid){
      let html = '';
      for(let i=0; i<PHOTO_COUNT; i++) html += renderPhotoSlot(type, id, i);
      grid.innerHTML = html;
    }
  }
  updateSummary(type, id);
}

let pendingDelete = null;
function removeUnit(type, id){
  pendingDelete = {type, id};
  const name = getDisplayName(type, id);
  document.getElementById('confirmTitle').textContent = `${name}를 삭제하시겠습니까?`;
  document.getElementById('confirmMsg').textContent = `입력하신 데이터가 모두 사라집니다.`;
  document.getElementById('confirmModal').classList.add('active');
  document.getElementById('confirmDeleteBtn').onclick = function(){
    if(!pendingDelete) return;
    const {type, id} = pendingDelete;
    const deletedName = name;
    const card = document.getElementById(`${type}_${id}_card`);
    if(card) card.remove();
    delete unitSubtype[`${type}_${id}`];
    delete unitPhotos[`${type}_${id}`];
    refreshCardLabels(type);
    updateCount(type);
    renderGroupSummary(type);
    saveData();
    closeConfirmModal();
    showToast(`✅ ${deletedName} 삭제 완료`);
    pendingDelete = null;
  };
}
function closeConfirmModal(e){ if(e && e.target.id !== 'confirmModal' && e.type==='click') return; document.getElementById('confirmModal').classList.remove('active'); pendingDelete = null; }

function showToast(msg){
  const toast = document.getElementById('toast');

  toast.classList.add('show');

}

function manualSave(){ 
  try{ saveData(); alert('저장 완료'); }
  catch(e){
    console.error(e);
    if(e.name === 'QuotaExceededError') alert('❌ 저장 실패: 용량 초과\n\n사진이 너무 많거나 큽니다. 일부 사진을 삭제해주세요.');
    else alert('저장 중 오류가 발생했습니다.');
  }

function saveData(){
  const data = {
    projectName: document.getElementById('projectName')?.value || '',
    buildingName: document.getElementById('buildingName')?.value || '',
    projectStartDate: document.getElementById('projectStartDate')?.value || '',
    dateRange: document.getElementById('dateRange')?.value || '',
    units: {}
  };
  Object.keys(fieldConfig).forEach(type=>{
    data.units[type] = [];
    const container = document.getElementById(type+'Units');
    if(!container) return;
    container.querySelectorAll('.card').forEach(card=>{
      data.units[type].push(collectUnitData(type, card.dataset.id));
    });
  });
  localStorage.setItem('facilityReport', JSON.stringify(data));
}

function loadSummary(){
  const raw = localStorage.getItem('facilityReport');
  if(!raw){ document.getElementById('summaryBox').textContent = '저장된 데이터 없음'; return; }
  try{
    const data = JSON.parse(raw);
    const preview = JSON.parse(JSON.stringify(data));
    if(preview.units){
      Object.keys(preview.units).forEach(type=>{
        preview.units[type].forEach(u=>{
          if(u.photos){ u.photos = u.photos.map(p=> p && p.img ? {img:'[사진 데이터 생략]', desc:p.desc} : p); }
        });
      });
    }
    document.getElementById('summaryBox').textContent = JSON.stringify(preview, null, 2);
  } catch(e){ document.getElementById('summaryBox').textContent = raw; }
}

function dataURLToArrayBuffer(dataURL){
  const base64 = dataURL.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

function collectColdSourceData(){
  const container = document.getElementById('coldSourceUnits');
  if(!container || container.querySelectorAll('.card').length === 0) return null;

  const projectInfo = {
    projectName: document.getElementById('projectName')?.value || '',
    buildingName: document.getElementById('buildingName')?.value || '',
    projectStartDate: document.getElementById('projectStartDate')?.value || '',
    dateRange: document.getElementById('dateRange')?.value || ''
  };

  const cards = Array.from(container.querySelectorAll('.card'));
  const ordered = [];
  subtypeMap.coldSource.forEach(st=>{
    cards.forEach(card=>{
      if(getUnitSubtype('coldSource', card.dataset.id) === st.key){
        ordered.push({card, st});
      }
    });
  });

  const allUnits = [];
  let counter = {};
  ordered.forEach(({card, st})=>{
    const id = card.dataset.id;
    counter[st.key] = (counter[st.key]||0) + 1;
    const unitNum = counter[st.key];

    const diag = {};
    const rates = {};
    turboDiagItems.forEach(item=>{
      const baseKey = `coldSource_${id}_diag_${item.key}`;
      const rateEl = document.querySelector(`input[name="${baseKey}_rate"]:checked`);
      const contentEl = document.getElementById(`${baseKey}_content`);
      const r = rateEl ? rateEl.value : '';
      diag[item.key] = { rate: r, content: contentEl ? contentEl.value : '' };
      if(r) rates[item.key] = r;
    });

    const { grade, score } = calculateOverallGrade(rates);

    const photos = unitPhotos[`coldSource_${id}`] || new Array(PHOTO_COUNT).fill(null).map(()=>({img:null,desc:''}));
    const opinion = document.getElementById(`coldSource_${id}_opinion`)?.value || '';
    const status = getUnitStatus('coldSource', id);

    allUnits.push({
      id, st, subtypeLabel: st.label, unitNum,
      diag, opinion, photos,
      statusText: statusText(status),
      diagRates: turboDiagItems.map(item => diag[item.key]?.rate || '-'),
      grade, score
    });
  });

  return { projectInfo, allUnits };
}

    cell.font = { bold:true, color:{argb:'FFFFFFFF'}, name:'맑은 고딕', size:10 };
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF1F2937'} };
    cell.alignment = { horizontal:'center', vertical:'middle', wrapText:true };
    cell.border = {
      top:{style:'thin',color:{argb:'FFE5E7EB'}}, bottom:{style:'thin',color:{argb:'FFE5E7EB'}},
      left:{style:'thin',color:{argb:'FFE5E7EB'}}, right:{style:'thin',color:{argb:'FFE5E7EB'}}
    };
  });
  hRow.height = 38;
  r++;

  allUnits.forEach(u => {
    const row = ws.getRow(r);
    const gradeText = u.grade === '-' ? '-' : `${u.grade} (${u.score}점)`;
    row.values = [u.subtypeLabel, `${u.unitNum}호기`, u.statusText, ...u.diagRates, gradeText];
    row.eachCell((cell, col)=>{
      cell.alignment = { horizontal:'center', vertical:'middle' };
      cell.font = { name:'맑은 고딕' };
      cell.border = {
        top:{style:'thin',color:{argb:'FFE5E7EB'}}, bottom:{style:'thin',color:{argb:'FFE5E7EB'}},
        left:{style:'thin',color:{argb:'FFE5E7EB'}}, right:{style:'thin',color:{argb:'FFE5E7EB'}}
      };
      if(col >= 4 && col <= 11){
        const v = cell.value;
        if(v==='A') cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFD1FAE5'} };
        else if(v==='B') cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFED7AA'} };
        else if(v==='C') cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFECACA'} };
      }
      if(col === 12){
        cell.font = { name:'맑은 고딕', bold:true, size:12 };
        if(u.grade==='A'){
          cell.font = {...cell.font, color:{argb:'FF059669'}};
          cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFD1FAE5'} };
        } else if(u.grade==='B'){
          cell.font = {...cell.font, color:{argb:'FFD97706'}};
          cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFED7AA'} };
        } else if(u.grade==='C'){
          cell.font = {...cell.font, color:{argb:'FFDC2626'}};
          cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFECACA'} };
        }
      }
    });
    row.height = 24;
    r++;
  });
}

function buildUnitSheet(wb, sheetName, u, projectInfo){
  const ws = wb.addWorksheet(sheetName, { views: [{ showGridLines: false }] });

  // 컬럼 너비 설정
  // A~G: 진단표 영역, H: spacer, I~K: 좌측 사진(3컬럼), L: 숨김, M~O: 우측 사진(3컬럼), P: 숨김
  const colWidths = [3.5, 14, 7, 30, 12, 14, 12, 14, 17, 17, 17, 5, 17, 17, 17, 5];
  colWidths.forEach((w, i) => ws.getColumn(i+1).width = w);

  // L열(12), P열(16), Q열 이후 모두 숨김
  ws.getColumn(12).hidden = true; // L열
  ws.getColumn(16).hidden = true; // P열
  for(let i = 17; i <= 30; i++){
    ws.getColumn(i).hidden = true;
  }

  const thinBorder = { style:'thin', color:{argb:'FFCBD5E1'} };
  const border = { top:thinBorder, bottom:thinBorder, left:thinBorder, right:thinBorder };

  // ========== 제목 (A1:O2) ==========
  ws.mergeCells('A1:O2');
  const title = ws.getCell('A1');
  title.value = `🔍 1차 진단 Check : ${u.subtypeLabel} - ${u.unitNum}호기`;
  title.font = { name:'맑은 고딕', size:18, bold:true, color:{argb:'FFFFFFFF'} };
  title.alignment = { vertical:'middle', horizontal:'center' };
  title.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF1F2937'} };
  ws.getRow(1).height = 28;
  ws.getRow(2).height = 28;

  // ========== 좌측 정보 박스 (A4~G8) ==========
  const infoStartRow = 4;
  const gradeText = u.grade === '-' ? '미평가' : `${u.grade} (${u.score}점)`;
  const infoData = [
    ['프로젝트명', projectInfo.projectName || '-'],
    ['장비명', `${u.subtypeLabel} - ${u.unitNum}호기`],
    ['장비번호', `${u.unitNum}호기`],
    ['상태', u.statusText],
    ['종합 등급', gradeText]
  ];
  infoData.forEach((row, i) => {
    const r = infoStartRow + i;
    ws.mergeCells(`A${r}:B${r}`);
    ws.mergeCells(`C${r}:G${r}`);
    const labelCell = ws.getCell(`A${r}`);
    labelCell.value = row[0];
    labelCell.font = { name:'맑은 고딕', bold:true, size:11, color:{argb:'FF374151'} };
    labelCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFF3F4F6'} };
    labelCell.alignment = { vertical:'middle', horizontal:'center' };
    labelCell.border = border;
    const valCell = ws.getCell(`C${r}`);
    valCell.value = row[1];
    valCell.font = { name:'맑은 고딕', size:11 };
    valCell.alignment = { vertical:'middle', horizontal:'left', indent:1 };
    valCell.border = border;
    // 종합 등급 색상 강조
    if(row[0] === '종합 등급' && u.grade !== '-'){
      if(u.grade === 'A'){
        valCell.font = { name:'맑은 고딕', size:13, bold:true, color:{argb:'FF059669'} };
        valCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFD1FAE5'} };
      } else if(u.grade === 'B'){
        valCell.font = { name:'맑은 고딕', size:13, bold:true, color:{argb:'FFD97706'} };
        valCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFED7AA'} };
      } else if(u.grade === 'C'){
        valCell.font = { name:'맑은 고딕', size:13, bold:true, color:{argb:'FFDC2626'} };
        valCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFECACA'} };
      }
    }
    ws.getRow(r).height = 22;
  });

  // ========== 우측 사진 영역 (사진 있는 것만) ==========
  const validPhotos = (u.photos || []).map((p,i)=>({photo:p, idx:i})).filter(x=>x.photo && x.photo.img);
  
  if(validPhotos.length > 0){
    // 사진 헤더 (I4:O4) - L 숨김이므로 I~O 머지하면 보이는 건 I~K, M~O
    ws.mergeCells('I4:O4');
    const photoTitle = ws.getCell('I4');
    photoTitle.value = '📸 현장 사진';
    photoTitle.font = { name:'맑은 고딕', bold:true, size:13, color:{argb:'FFFFFFFF'} };
    photoTitle.alignment = { vertical:'middle', horizontal:'center' };
    photoTitle.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF1F2937'} };
    ws.getRow(4).height = 24;

    const photoLayout = [
      { descRow: 5,  imgStartRow: 6  },
      { descRow: 13, imgStartRow: 14 },
      { descRow: 21, imgStartRow: 22 },
      { descRow: 29, imgStartRow: 30 }
    ];

    for(let row = 0; row < Math.ceil(validPhotos.length / 2); row++){
      const layout = photoLayout[row];
      const leftPhoto = validPhotos[row * 2];
      const rightPhoto = validPhotos[row * 2 + 1];

      // 좌측 사진 (I~K, 3컬럼)
      if(leftPhoto){
        ws.mergeCells(`I${layout.descRow}:K${layout.descRow}`);
        const leftDesc = ws.getCell(`I${layout.descRow}`);
        leftDesc.value = `📷 사진${leftPhoto.idx+1}: ${leftPhoto.photo.desc || ''}`;
        leftDesc.font = { name:'맑은 고딕', bold:true, size:10, color:{argb:'FF1E40AF'} };
        leftDesc.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFEFF6FF'} };
        leftDesc.alignment = { vertical:'middle', horizontal:'left', indent:1 };
        leftDesc.border = border;

        for(let r = layout.imgStartRow; r < layout.imgStartRow + 7; r++){
          ['I','J','K'].forEach(col => {
            ws.getCell(`${col}${r}`).border = border;
          });
        }

        try{
          const imgId = wb.addImage({
            buffer: dataURLToArrayBuffer(leftPhoto.photo.img),
            extension: 'jpeg'
          });
          ws.addImage(imgId, {
            tl: { col: 8 + 0.05, row: layout.imgStartRow - 1 + 0.05 },
            ext: { width: EXCEL_PHOTO_W, height: EXCEL_PHOTO_H },
            editAs: 'oneCell'
          });
        }catch(e){ console.error(`이미지 임베드 실패:`, e); }
      }

      // 우측 사진 (M~O, 3컬럼)
      if(rightPhoto){
        ws.mergeCells(`M${layout.descRow}:O${layout.descRow}`);
        const rightDesc = ws.getCell(`M${layout.descRow}`);
        rightDesc.value = `📷 사진${rightPhoto.idx+1}: ${rightPhoto.photo.desc || ''}`;
        rightDesc.font = { name:'맑은 고딕', bold:true, size:10, color:{argb:'FF1E40AF'} };
        rightDesc.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFEFF6FF'} };
        rightDesc.alignment = { vertical:'middle', horizontal:'left', indent:1 };
        rightDesc.border = border;

        for(let r = layout.imgStartRow; r < layout.imgStartRow + 7; r++){
          ['M','N','O'].forEach(col => {
            ws.getCell(`${col}${r}`).border = border;
          });
        }

        try{
          const imgId = wb.addImage({
            buffer: dataURLToArrayBuffer(rightPhoto.photo.img),
            extension: 'jpeg'
          });
          ws.addImage(imgId, {
            tl: { col: 12 + 0.05, row: layout.imgStartRow - 1 + 0.05 },
            ext: { width: EXCEL_PHOTO_W, height: EXCEL_PHOTO_H },
            editAs: 'oneCell'
          });
        }catch(e){ console.error(`이미지 임베드 실패:`, e); }
      }

      ws.getRow(layout.descRow).height = 20;
      for(let r = layout.imgStartRow; r < layout.imgStartRow + 7; r++){
        ws.getRow(r).height = 25;
      }
    }
  }

  // ========== 진단 체크리스트 ==========
  const checkStartRow = 10;
  ws.mergeCells(`A${checkStartRow}:G${checkStartRow}`);
  const checkTitle = ws.getCell(`A${checkStartRow}`);
  checkTitle.value = '🔍 1차 진단 Check-list (육안점검)';
  checkTitle.font = { name:'맑은 고딕', bold:true, size:13, color:{argb:'FFFFFFFF'} };
  checkTitle.alignment = { vertical:'middle', horizontal:'center' };
  checkTitle.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF1F2937'} };
  ws.getRow(checkStartRow).height = 24;

  const headerRow = checkStartRow + 1;
  ws.mergeCells(`D${headerRow}:E${headerRow}`);
  ws.mergeCells(`F${headerRow}:G${headerRow}`);
  
  const headers = [
    {col:'A', text:'번호'}, {col:'B', text:'인자 (가중치)'}, {col:'C', text:'평가'},
    {col:'D', text:'주요 내용'}, {col:'F', text:'조사 대상'}
  ];
  headers.forEach(h => {
    const cell = ws.getCell(`${h.col}${headerRow}`);
    cell.value = h.text;
    cell.font = { name:'맑은 고딕', bold:true, size:11, color:{argb:'FFFFFFFF'} };
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF374151'} };
    cell.alignment = { vertical:'middle', horizontal:'center' };
    cell.border = border;
  });
  ['E','G'].forEach(col => {
    const cell = ws.getCell(`${col}${headerRow}`);
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF374151'} };
    cell.border = border;
  });
  ws.getRow(headerRow).height = 26;

  turboDiagItems.forEach((item, idx) => {
    const r = headerRow + 1 + idx;
    ws.getRow(r).height = 32;

    const numCell = ws.getCell(`A${r}`);
    numCell.value = idx + 1;
    numCell.font = { name:'맑은 고딕', bold:true, size:11 };
    numCell.alignment = { vertical:'middle', horizontal:'center' };
    numCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFEFF6FF'} };
    numCell.border = border;

    const factorCell = ws.getCell(`B${r}`);
    factorCell.value = `${item.factor}\n(${item.weight}%)`;
    factorCell.font = { name:'맑은 고딕', bold:true, size:10 };
    factorCell.alignment = { vertical:'middle', horizontal:'left', indent:1, wrapText:true };
    factorCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFF9FAFB'} };
    factorCell.border = border;

    const rateCell = ws.getCell(`C${r}`);
    const rate = u.diag[item.key]?.rate || '';
    rateCell.value = rate;
    rateCell.alignment = { vertical:'middle', horizontal:'center' };
    if(rate === 'A') {
      rateCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFD1FAE5'} };
      rateCell.font = { name:'맑은 고딕', bold:true, size:14, color:{argb:'FF059669'} };
    } else if(rate === 'B') {
      rateCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFED7AA'} };
      rateCell.font = { name:'맑은 고딕', bold:true, size:14, color:{argb:'FFD97706'} };
    } else if(rate === 'C') {
      rateCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFECACA'} };
      rateCell.font = { name:'맑은 고딕', bold:true, size:14, color:{argb:'FFDC2626'} };
    } else {
      rateCell.font = { name:'맑은 고딕', bold:true, size:14 };
    }
    rateCell.border = border;

    ws.mergeCells(`D${r}:E${r}`);
    const contentCell = ws.getCell(`D${r}`);
    contentCell.value = u.diag[item.key]?.content || '';
    contentCell.font = { name:'맑은 고딕', size:10 };
    contentCell.alignment = { vertical:'middle', horizontal:'left', indent:1, wrapText:true };
    contentCell.border = border;
    ws.getCell(`E${r}`).border = border;

    ws.mergeCells(`F${r}:G${r}`);
    const targetCell = ws.getCell(`F${r}`);
    targetCell.value = item.target;
    targetCell.font = { name:'맑은 고딕', size:10, color:{argb:'FF6B7280'} };
    targetCell.alignment = { vertical:'middle', horizontal:'center', wrapText:true };
    targetCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFAFAFA'} };
    targetCell.border = border;
    ws.getCell(`G${r}`).border = border;
  });

  // ========== 주요 검토 의견 ==========
  const opinionTitleRow = headerRow + 1 + turboDiagItems.length + 1;
  ws.mergeCells(`A${opinionTitleRow}:G${opinionTitleRow}`);
  const opTitle = ws.getCell(`A${opinionTitleRow}`);
  opTitle.value = '📝 주요 검토 의견';
  opTitle.font = { name:'맑은 고딕', bold:true, size:13, color:{argb:'FFFFFFFF'} };
  opTitle.alignment = { vertical:'middle', horizontal:'center' };
  opTitle.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF1F2937'} };
  ws.getRow(opinionTitleRow).height = 24;

  const opStartRow = opinionTitleRow + 1;
  const opEndRow = opStartRow + 6;
  ws.mergeCells(`A${opStartRow}:G${opEndRow}`);
  const opCell = ws.getCell(`A${opStartRow}`);
  opCell.value = u.opinion || '(미입력)';
  opCell.font = { name:'맑은 고딕', size:11 };
  opCell.alignment = { vertical:'top', horizontal:'left', wrapText:true, indent:1 };
  opCell.border = border;
  for(let r = opStartRow; r <= opEndRow; r++){
    ws.getRow(r).height = 22;
  }

  ws.pageSetup = {
    paperSize: 9, orientation: 'landscape',
    fitToPage: true, fitToWidth: 1, fitToHeight: 0,
    margins: { left:0.4, right:0.4, top:0.5, bottom:0.5, header:0.3, footer:0.3 }
  };
}

async function exportToExcel(){
  if(typeof ExcelJS === 'undefined'){
    alert('ExcelJS 라이브러리가 아직 로드되지 않았습니다.');
    return;
  }

  const collected = collectColdSourceData();
  if(!collected){
    alert('⚠️ 내보낼 냉열원 데이터가 없습니다.');
    return;
  }

  showLoading('엑셀 생성 중...');

  try{
    const { projectInfo, allUnits } = collected;
    const wb = new ExcelJS.Workbook();
    wb.creator = 'HIMEC 진단 시스템';
    wb.created = new Date();

    showLoading('종합 요약 시트 생성 중...');
    buildSummarySheet(wb, projectInfo, allUnits);

    for(let i=0; i<allUnits.length; i++){
      const u = allUnits[i];
      showLoading(`호기별 시트 생성 중... (${i+1}/${allUnits.length})\n${u.subtypeLabel} ${u.unitNum}호기`);
      let sheetName = `${u.subtypeLabel.replace(/\s+/g,'')}_${u.unitNum}호기`;
      if(sheetName.length > 31) sheetName = sheetName.substring(0, 31);
      let suffix = 1;
      let finalName = sheetName;
      while(wb.getWorksheet(finalName)){
        finalName = sheetName.substring(0, 28) + `_${suffix}`;
        suffix++;
      }
      buildUnitSheet(wb, finalName, u, projectInfo);
    }

    showLoading('파일 저장 중...');
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const safeName = (projectInfo.projectName || '냉동기진단').replace(/[\\/:*?"<>|]/g,'_');
    const today = new Date().toISOString().slice(0,10);
    saveAs(blob, `${safeName}_${today}.xlsx`);

    hideLoading();
    showToast(`✅ 엑셀 파일 다운로드 완료 (${allUnits.length}개 호기)`);
  }catch(e){
    hideLoading();
    console.error(e);
    alert('❌ 엑셀 내보내기 중 오류:\n\n' + (e.message || e));
  }
}

    bodyHTML += `<div class="section-h">📊 냉열원 진단 종합 요약</div>`;
    bodyHTML += `<table class="data-table"><thead><tr>`;

      u.diagRates.forEach(r => {

window.onload = function(){
  const raw = localStorage.getItem('facilityReport');
  let data = {};
  try { data = raw ? JSON.parse(raw) : {}; } catch(e){ data = {}; }
  if(data.projectName) document.getElementById('projectName').value = data.projectName;
  if(data.buildingName) document.getElementById('buildingName').value = data.buildingName;
  if(data.projectStartDate) document.getElementById('projectStartDate').value = data.projectStartDate;
  if(data.dateRange) document.getElementById('dateRange').value = data.dateRange;
  updateHeroBadge();

  if(data.units){
    Object.keys(data.units).forEach(type=>{
      if(!fieldConfig[type]) return;
      data.units[type].forEach((unitData)=>{
        addUnit(type);
        const id = unitCount[type];
        setTimeout(()=>applyUnitData(type, id, unitData), 50);
      });
    });
    setTimeout(()=>{
      Object.keys(fieldConfig).forEach(type=>{
        refreshCardLabels(type);
        const container = document.getElementById(type+'Units');
        if(container){ container.querySelectorAll('.card').forEach(card=>{ updateSummary(type, card.dataset.id); }); }
        renderGroupSummary(type);
      });
    }, 250);
  }

  const firstMainBtn = document.querySelector('.main-tabs button[data-section="heatSection"]');
  if(firstMainBtn) firstMainBtn.classList.add('active');
  const firstSubBtn = document.querySelector('.sub-tabs button[data-sub="coldSourceSection"]');
  if(firstSubBtn) firstSubBtn.classList.add('active');
  ['coldSource','heatSource','coolingTower'].forEach(t=>renderGroupSummary(t));
  renderCalendar();
};
</script>
